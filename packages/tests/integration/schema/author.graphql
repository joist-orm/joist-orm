extend type Query {
  author(id: ID!): Author!
  authors(filter: AuthorFilter, limit: Int, offset: Int): AuthorsPage!
}

extend type Mutation {
  saveAuthor(input: SaveAuthorInput!): SaveAuthorResult!
}

type Author {
  id: ID!
  firstName: String!
  lastName: String
  fullName: String
  initials: String!
  numberOfBooks: Int!
  isPopular: Boolean
  age: Int
  wasEverPopular: Boolean
  createdAt: Date!
  updatedAt: Date!
  mentor: Author
  publisher: Publisher
  books: [Book!]!
  image: Image
  graduated: Date
  favoriteColors: [Color!]!
  favoriteShape: FavoriteShape
  tags: [Tag!]!
  currentDraftBook: Book
  bookComments: String
  deletedAt: DateTime
  numberOfPublicReviews: Int
  ssn: String
  userOneToOne: User
  favoriteBook: Book
  numberOfPublicReviews2: Int
  numberOfAtoms: BigInt
  tagsOfAllBooks: String!
  nickNames: [String!]
  graphqlOnlyField(arg: Int): Int!
  tasks: [Task!]!
  rangeOfBooks: BookRangeDetail
  mentees: [Author!]!
  mentorNames: String
  isFunny: Boolean!
  menteesClosure: [Author!]!
  mentorsClosure: [Author!]!
  menteeNames: String
  imageFileName: String
}

input SaveAuthorInput {
  id: ID
  firstName: String
  lastName: String
  initials: String
  numberOfBooks: Int
  isPopular: Boolean
  age: Int
  wasEverPopular: Boolean
  createdAt: Date
  updatedAt: Date
  mentorId: ID
  publisherId: ID
  graduated: Date
  favoriteColors: [Color!]
  favoriteShape: FavoriteShape
  currentDraftBookId: ID
  deletedAt: DateTime
  ssn: String
  favoriteBookId: ID
  numberOfAtoms: BigInt
  nickNames: [String!]
  rangeOfBooks: BookRange
  mentorNames: String
  isFunny: Boolean
  menteeNames: String
  imageFileName: String
}

type SaveAuthorResult {
  author: Author!
}

type AuthorsPage {
  entities: [Author!]!
  pageInfo: PageInfo!
}

input AuthorFilter {
  id: [ID!]
  firstName: [String!]
  lastName: [String!]
  ssn: [String!]
  initials: [String!]
  numberOfBooks: [Int!]
  bookComments: [String!]
  isPopular: [Boolean!]
  age: [Int!]
  graduated: [Date!]
  wasEverPopular: [Boolean!]
  isFunny: [Boolean!]
  mentorNames: [String!]
  menteeNames: [String!]
  deletedAt: [DateTime!]
  numberOfPublicReviews: [Int!]
  numberOfPublicReviews2: [Int!]
  tagsOfAllBooks: [String!]
  search: [String!]
  imageFileName: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  rangeOfBooks: [BookRange!]
  favoriteColors: [[Color!]!]
  favoriteShape: [FavoriteShape!]
  mentorId: [ID!]
  rootMentorId: [ID!]
  currentDraftBookId: [ID!]
  favoriteBookId: [ID!]
  publisherId: [ID!]
  numberOfAtoms: [BigInt!]
}
