type Book {
  id: ID!
  title: String!
  order: Int
  createdAt: Date!
  updatedAt: Date!
  author: Author!
  advances: [BookAdvance!]!
  reviews: [BookReview!]!
  tags: [Tag!]!
  image: Image
  comments: [Comment!]!
  currentDraftAuthor: Author
  deletedAt: DateTime
  notes: String
  acknowledgements: String
  search: String
  authorsNickNames: String
}

input SaveBookInput {
  id: ID
  title: String
  order: Int
  createdAt: Date
  updatedAt: Date
  authorId: ID
  deletedAt: DateTime
  notes: String
  acknowledgements: String
  authorsNickNames: String
}

type SaveBookResult {
  book: Book!
}

extend type Mutation {
  saveBook(input: SaveBookInput!): SaveBookResult!
}

extend type Query {
  book(id: ID!): Book!
  books(filter: BookFilter, limit: Int, offset: Int): BooksPage!
}

type BooksPage {
  entities: [Book!]!
  pageInfo: PageInfo!
}

input BookFilter {
  id: ID
  title: String
  order: Int
  notes: String
  acknowledgements: String
  authorsNickNames: String
  search: String
  deletedAt: DateTime
  createdAt: DateTime
  updatedAt: DateTime
  prequelId: ID
  authorId: ID
  reviewerId: ID
  randomCommentId: ID
}
