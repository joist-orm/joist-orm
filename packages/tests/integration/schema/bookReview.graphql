type BookReview {
  id: ID!
  rating: Int!
  isPublic: Boolean!
  createdAt: Date!
  updatedAt: Date!
  book: Book!
  comment: Comment
  isTest: Boolean!
  tags: [Tag!]!
  isTestChain: Boolean!
}

input SaveBookReviewInput {
  id: ID
  rating: Int
  isPublic: Boolean
  createdAt: Date
  updatedAt: Date
  bookId: ID
}

type SaveBookReviewResult {
  bookReview: BookReview!
}

extend type Mutation {
  saveBookReview(input: SaveBookReviewInput!): SaveBookReviewResult!
}

extend type Query {
  bookReview(id: ID!): BookReview!
  bookReviews(filter: BookReviewFilter, limit: Int, offset: Int): BookReviewsPage!
}

type BookReviewsPage {
  entities: [BookReview!]!
  pageInfo: PageInfo!
}

input BookReviewFilter {
  id: ID
  rating: Int
  isPublic: Boolean
  isTest: Boolean
  isTestChain: Boolean
  createdAt: DateTime
  updatedAt: DateTime
  bookId: ID
  criticId: ID
}
