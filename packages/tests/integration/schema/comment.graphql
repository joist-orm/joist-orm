type Comment {
  id: ID!
  text: String
  createdAt: DateTime!
  updatedAt: DateTime!
  parent: CommentParent
  user: User
  likedByUsers: [User!]!
  parentTags: String!
}

extend type Mutation {
  saveComment(input: SaveCommentInput!): SaveCommentResult!
}

input SaveCommentInput {
  id: ID
  text: String
  parentId: ID
  userId: ID
  parentTags: String
}

type SaveCommentResult {
  comment: Comment!
}

union CommentParent = Author | Book | BookReview | Publisher | TaskOld

extend type Query {
  comment(id: ID!): Comment!
  comments(filter: CommentFilter, limit: Int, offset: Int): CommentsPage!
}

type CommentsPage {
  entities: [Comment!]!
  pageInfo: PageInfo!
}

input CommentFilter {
  id: [ID!]
  parentTaggedId: [String!]
  parentTags: [String!]
  text: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  userId: [ID!]
  parentId: [ID!]
}
