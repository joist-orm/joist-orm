type Critic {
  id: ID!
  name: String!
  createdAt: Date!
  updatedAt: Date!
  group: PublisherGroup
  favoriteLargePublisher: LargePublisher
}

extend type Mutation {
  saveCritic(input: SaveCriticInput!): SaveCriticResult!
}

input SaveCriticInput {
  id: ID
  name: String
  createdAt: Date
  updatedAt: Date
  groupId: ID
  favoriteLargePublisherId: ID
}

type SaveCriticResult {
  critic: Critic!
}

extend type Query {
  critic(id: ID!): Critic!
  critics(filter: CriticFilter, limit: Int, offset: Int): CriticsPage!
}

type CriticsPage {
  entities: [Critic!]!
  pageInfo: PageInfo!
}

input CriticFilter {
  id: ID
  name: String
  createdAt: DateTime
  updatedAt: DateTime
  favoriteLargePublisherId: ID
  groupId: ID
}
