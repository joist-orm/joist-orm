extend type Mutation {
  saveEmployee(input: SaveEmployeeInput!): SaveEmployeeResult!
}

type Employee {
  id: ID!
  name: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  manager: Employee
  reports: [Employee!]!
  managersClosure: [Employee!]!
  managerOfClosure: [Employee!]!
}

input SaveEmployeeInput {
  id: ID
  name: String
  managerId: ID
}

type SaveEmployeeResult {
  employee: Employee!
}
