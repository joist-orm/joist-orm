type Image {
  id: ID!
  fileName: String!
  createdAt: Date!
  updatedAt: Date!
  type: ImageType!
  author: Author
  book: Book
  publisher: Publisher
}

input SaveImageInput {
  id: ID
  fileName: String
  createdAt: Date
  updatedAt: Date
  type: ImageType
  authorId: ID
  bookId: ID
  publisherId: ID
}

type SaveImageResult {
  image: Image!
}

extend type Mutation {
  saveImage(input: SaveImageInput!): SaveImageResult!
}

extend type Query {
  image(id: ID!): Image!
  images(filter: ImageFilter, limit: Int, offset: Int): ImagesPage!
}

type ImagesPage {
  entities: [Image!]!
  pageInfo: PageInfo!
}

input ImageFilter {
  id: ID
  fileName: String
  createdAt: DateTime
  updatedAt: DateTime
  type: ImageType
  authorId: ID
  bookId: ID
  publisherId: ID
}
