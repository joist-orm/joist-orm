extend type Mutation {
  saveLargePublisher(input: SaveLargePublisherInput!): SaveLargePublisherResult!
}

type LargePublisher {
  id: ID!
  country: String
  name: String!
  latitude: Int
  longitude: Int
  hugeNumber: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  size: PublisherSizeDetail
  type: PublisherTypeDetail!
  group: PublisherGroup
  authors: [Author!]!
  bookAdvances: [BookAdvance!]!
  comments: [Comment!]!
  images: [Image!]!
  tags: [Tag!]!
  critics: [Critic!]!
  numberOfBookReviews: Int
  tasks: [Task!]!
  deletedAt: DateTime
  sharedColumn: String
  baseSyncDefault: String
  baseAsyncDefault: String!
  rating: Int!
}

input SaveLargePublisherInput {
  id: ID
  country: String
  name: String
  latitude: Int
  longitude: Int
  hugeNumber: Int
  size: PublisherSize
  type: PublisherType
  groupId: ID
  deletedAt: DateTime
  sharedColumn: String
  baseSyncDefault: String
  baseAsyncDefault: String
  rating: Int
}

type SaveLargePublisherResult {
  largePublisher: LargePublisher!
}

extend type Query {
  largePublisher(id: ID!): LargePublisher!
  largePublishers(filter: LargePublisherFilter, limit: Int, offset: Int): LargePublishersPage!
}

type LargePublishersPage {
  entities: [LargePublisher!]!
  pageInfo: PageInfo!
}

input LargePublisherFilter {
  id: ID
  name: String
  latitude: Int
  longitude: Int
  hugeNumber: Int
  numberOfBookReviews: Int
  deletedAt: DateTime
  titlesOfFavoriteBooks: String
  bookAdvanceTitlesSnapshot: String
  numberOfBookAdvancesSnapshot: String
  baseSyncDefault: String
  baseAsyncDefault: String
  createdAt: DateTime
  updatedAt: DateTime
  favoriteAuthorName: String
  size: PublisherSize
  type: PublisherType
  favoriteAuthorId: ID
  groupId: ID
  spotlightAuthorId: ID
  sharedColumn: String
  country: String
}
