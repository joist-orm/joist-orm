extend type Mutation {
  savePublisherGroup(input: SavePublisherGroupInput!): SavePublisherGroupResult!
}

type PublisherGroup {
  id: ID!
  name: String
  createdAt: DateTime!
  updatedAt: DateTime!
  publishers: [Publisher!]!
  critics: [Critic!]!
  numberOfBookReviews: Int
  numberOfBookReviewsFormatted: String!
}

input SavePublisherGroupInput {
  id: ID
  name: String
  numberOfBookReviews: Int
  numberOfBookReviewsFormatted: String
}

type SavePublisherGroupResult {
  publisherGroup: PublisherGroup!
}

extend type Query {
  publisherGroup(id: ID!): PublisherGroup!
  publisherGroups(filter: PublisherGroupFilter, limit: Int, offset: Int): PublisherGroupsPage!
}

type PublisherGroupsPage {
  entities: [PublisherGroup!]!
  pageInfo: PageInfo!
}

input PublisherGroupFilter {
  id: ID
  name: String
  numberOfBookReviews: Int
  numberOfBookReviewsFormatted: String
  createdAt: DateTime
  updatedAt: DateTime
}
