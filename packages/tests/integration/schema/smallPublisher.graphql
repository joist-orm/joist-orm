extend type Mutation {
  saveSmallPublisher(input: SaveSmallPublisherInput!): SaveSmallPublisherResult!
}

type SmallPublisher {
  id: ID!
  city: String
  allAuthorNames: String
  name: String!
  latitude: Int
  longitude: Int
  hugeNumber: Int
  createdAt: DateTime!
  updatedAt: DateTime!
  size: PublisherSizeDetail
  type: PublisherTypeDetail!
  group: PublisherGroup
  authors: [Author!]!
  bookAdvances: [BookAdvance!]!
  comments: [Comment!]!
  images: [Image!]!
  tags: [Tag!]!
  numberOfBookReviews: Int
  tasks: [Task!]!
  deletedAt: DateTime
  sharedColumn: String
  baseSyncDefault: String
  baseAsyncDefault: String!
  selfReferential: SmallPublisher
  smallPublishers: [SmallPublisher!]!
  rating: Int
}

input SaveSmallPublisherInput {
  id: ID
  city: String
  name: String
  latitude: Int
  longitude: Int
  hugeNumber: Int
  size: PublisherSize
  type: PublisherType
  groupId: ID
  deletedAt: DateTime
  sharedColumn: String
  baseSyncDefault: String
  baseAsyncDefault: String
  selfReferentialId: ID
  rating: Int
}

type SaveSmallPublisherResult {
  smallPublisher: SmallPublisher!
}

extend type Query {
  smallPublisher(id: ID!): SmallPublisher!
  smallPublishers(filter: SmallPublisherFilter, limit: Int, offset: Int): SmallPublishersPage!
}

type SmallPublishersPage {
  entities: [SmallPublisher!]!
  pageInfo: PageInfo!
}

input SmallPublisherFilter {
  id: [ID!]
  name: [String!]
  latitude: [Int!]
  longitude: [Int!]
  hugeNumber: [Int!]
  numberOfBookReviews: [Int!]
  deletedAt: [DateTime!]
  titlesOfFavoriteBooks: [String!]
  bookAdvanceTitlesSnapshot: [String!]
  numberOfBookAdvancesSnapshot: [String!]
  baseSyncDefault: [String!]
  baseAsyncDefault: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  favoriteAuthorName: [String!]
  rating: [Int!]
  size: [PublisherSize!]
  type: [PublisherType!]
  favoriteAuthorId: [ID!]
  groupId: [ID!]
  spotlightAuthorId: [ID!]
  city: [String!]
  sharedColumn: [String!]
  allAuthorNames: [String!]
  selfReferentialId: [ID!]
}
