type Tag {
  id: ID!
  name: String!
  createdAt: Date!
  updatedAt: Date!
  books: [Book!]!
  publishers: [Publisher!]!
  bookReviews: [BookReview!]!
  tasks: [Task!]!
  authors: [Author!]!
}

input SaveTagInput {
  id: ID
  name: String
  createdAt: Date
  updatedAt: Date
}

type SaveTagResult {
  tag: Tag!
}

extend type Mutation {
  saveTag(input: SaveTagInput!): SaveTagResult!
}

extend type Query {
  tag(id: ID!): Tag!
  tags(filter: TagFilter, limit: Int, offset: Int): TagsPage!
}

type TagsPage {
  entities: [Tag!]!
  pageInfo: PageInfo!
}

input TagFilter {
  id: ID
  name: String
  createdAt: DateTime
  updatedAt: DateTime
}
