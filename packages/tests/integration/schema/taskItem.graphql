extend type Mutation {
  saveTaskItem(input: SaveTaskItemInput!): SaveTaskItemResult!
}

type TaskItem {
  id: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
  newTask: Task
  oldTask: Task
  task: Task
}

input SaveTaskItemInput {
  id: ID
  newTaskId: ID
  oldTaskId: ID
  taskId: ID
}

type SaveTaskItemResult {
  taskItem: TaskItem!
}

extend type Query {
  taskItem(id: ID!): TaskItem!
  taskItems(filter: TaskItemFilter, limit: Int, offset: Int): TaskItemsPage!
}

type TaskItemsPage {
  entities: [TaskItem!]!
  pageInfo: PageInfo!
}

input TaskItemFilter {
  id: [ID!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  newTaskId: [ID!]
  oldTaskId: [ID!]
  taskId: [ID!]
}
