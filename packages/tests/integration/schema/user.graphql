extend type Mutation {
  saveUser(input: SaveUserInput!): SaveUserResult!
}

type User {
  id: ID!
  name: String!
  email: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  authorManyToOne: Author
  createdComments: [Comment!]!
  likedComments: [Comment!]!
  bio: String!
  favoritePublisher: UserFavoritePublisher
  originalEmail: String!
  parents: [User!]!
  children: [User!]!
}

input SaveUserInput {
  id: ID
  name: String
  email: String
  authorManyToOneId: ID
  bio: String
  favoritePublisherId: ID
  originalEmail: String
}

type SaveUserResult {
  user: User!
}

union UserFavoritePublisher = LargePublisher | SmallPublisher

extend type Query {
  user(id: ID!): User!
  users(filter: UserFilter, limit: Int, offset: Int): UsersPage!
}

type UsersPage {
  entities: [User!]!
  pageInfo: PageInfo!
}

input UserFilter {
  id: [ID!]
  name: [String!]
  email: [String!]
  bio: [String!]
  originalEmail: [String!]
  trialPeriod: [String!]
  createdAt: [DateTime!]
  updatedAt: [DateTime!]
  managerId: [ID!]
  authorManyToOneId: [ID!]
  favoritePublisherId: [ID!]
}
